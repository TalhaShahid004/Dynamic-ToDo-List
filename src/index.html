<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talha's Dynamic ToDo List</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" type="x-icon" href="todo.ico">
</head>
<body>
    <button id="theme-toggle">Dark Mode</button>
    <h1>Talha's Dynamic 'Get To Do' List</h1>

    <form id="taskForm">
        <label for="taskName">Task Name:</label>
        <input type="text" id="taskName" required>

        <label for="taskWeight">Importance:</label>
        <input type="number" id="taskWeight" required>

        <label for="dueDate">Due Date:</label>
        <input type="date" id="dueDate">

        <label for="estimatedTime">Estimated Time (hours):</label>
        <input type="number" id="estimatedTime" required>

        <button type="button" onclick="addTask()">Add Task</button>
    </form>

    <label>
        <input type="checkbox" id="showIncompleteOnly" onchange="displayTasks()"> Show incomplete only
    </label>

    <button type="button" id="clearCompletedButton" onclick="clearCompletedTasks()">Clear Completed Tasks</button>

    <button type="button" id="exportTasksButton" onclick="exportTasks()" style="margin-left: 8px; padding: 6px 12px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">Export Tasks</button>

    <label for="importTasksInput" style="margin-left: 8px; padding: 6px 12px; background-color: #2196F3; color: white; border-radius: 4px; cursor: pointer; display: inline-block;">
        Import Tasks
        <input type="file" id="importTasksInput" accept="application/json" onchange="importTasks(event)" style="display: none;">
    </label>

    <table>
        <thead>
            <tr>
                <th></th>
                <th data-sort="name">Task Name</th>
                <th data-sort="weight">Importance</th>
                <th data-sort="dueDate">Due Date</th>
                <th data-sort="estimatedTime">Estimated Time</th>
                <th data-sort="priority">Priority</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="taskTableBody"></tbody>
    </table>

    <script src="script.js"></script>
    <script src="importExport.js"></script>
    <script>
    (function () {
        var btn = document.getElementById('theme-toggle');
        var saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        btn.textContent = saved === 'dark' ? 'Light Mode' : 'Dark Mode';
        btn.addEventListener('click', function () {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            btn.textContent = next === 'dark' ? 'Light Mode' : 'Dark Mode';
        });
    })();
    </script>
</body>
</html>
